#!/bin/bash
# BOSS-BOX 构建配置文件
# 修改此文件以自定义构建参数

# ==================== 项目信息 ====================
PROJECT_NAME="BOSS-BOX"
PROJECT_VERSION="0.1.0"
PROJECT_DESCRIPTION="Private AI Assistant for Business Owners"
PROJECT_MAINTAINER="BOSS-BOX Team <contact@bossbox.org>"
PROJECT_HOMEPAGE="https://bossbox.org"
PROJECT_LICENSE="Apache-2.0"

# ==================== 系统配置 ====================
# 基础系统
BASE_DISTRO="ubuntu"  # ubuntu, debian
BASE_VERSION="24.04"   # 24.04, 12, bookworm
BASE_ARCH="amd64"      # amd64, arm64
BASE_TYPE="core"       # core, server, desktop

# 系统设置
SYSTEM_HOSTNAME="bossbox"
SYSTEM_TIMEZONE="Asia/Shanghai"
SYSTEM_LOCALE="en_US.UTF-8"
SYSTEM_KEYBOARD="us"

# 用户设置
DEFAULT_USERNAME="boss"
DEFAULT_PASSWORD="boss123"  # 首次登录后强制修改
AUTO_LOGIN="yes"
SUDO_WITHOUT_PASSWORD="yes"

# ==================== 分区配置 ====================
# 磁盘布局
DISK_SIZE="16G"        # 最终镜像大小
BOOT_PART_SIZE="512M"  # ESP分区大小
ROOT_PART_SIZE="12G"   # 根分区大小
DATA_PART_SIZE="3G"    # 数据分区大小

# 文件系统
BOOT_FS="vfat"         # ESP分区格式
ROOT_FS="ext4"         # 根分区格式
DATA_FS="ext4"         # 数据分区格式

# 加密配置
ENCRYPT_ROOT="yes"     # 是否加密根分区
ENCRYPT_DATA="yes"     # 是否加密数据分区
LUKS_CIPHER="aes-xts-plain64"
LUKS_KEY_SIZE="512"
LUKS_HASH="sha512"
LUKS_ITER_TIME="5000"  # 迭代时间(ms)

# ==================== 网络配置 ====================
NETWORK_MANAGER="network-manager"  # network-manager, systemd-networkd
WIFI_SUPPORT="yes"
BLUETOOTH_SUPPORT="no"
FIREWALL="ufw"         # ufw, firewalld, none
SSH_SERVER="yes"
SSH_PORT="22"

# ==================== 软件包配置 ====================
# 包管理器
APT_MIRROR="http://archive.ubuntu.com/ubuntu/"
APT_SECURITY="http://security.ubuntu.com/ubuntu/"
APT_PROXY=""  # 如有代理设置: http://proxy:port

# 内核
KERNEL_PACKAGE="linux-image-generic"
KERNEL_PARAMS="quiet splash"

# 桌面环境 (最小化)
DESKTOP_ENVIRONMENT="openbox"  # openbox, xfce, none
DISPLAY_MANAGER="lightdm"      # lightdm, sddm, none
WINDOW_MANAGER="openbox"
PANEL="tint2"
TERMINAL="lxterminal"
FILE_MANAGER="pcmanfm"
WEB_BROWSER=""

# 必要系统包
BASE_PACKAGES="
  systemd
  systemd-sysv
  udev
  dbus
  network-manager
  wpasupplicant
  curl
  wget
  sudo
  vim
  nano
  htop
  pciutils
  usbutils
  fdisk
  parted
  gdisk
  cryptsetup
  cryptsetup-initramfs
  lvm2
  squashfs-tools
  dosfstools
  exfat-utils
  ntfs-3g
  btrfs-progs
  python3
  python3-pip
  python3-venv
  git
  build-essential
  openssh-server
  ufw
  fail2ban
  rsync
  tar
  gzip
  zip
  unzip
"

# AI相关包
AI_PACKAGES="
  ollama
  python3-numpy
  python3-pandas
  python3-scipy
  python3-transformers
  python3-torch
  python3-sentencepiece
  python3-protobuf
  python3-flask
  python3-fastapi
  python3-uvicorn
"

# 图形相关包
GUI_PACKAGES="
  xserver-xorg-core
  xinit
  openbox
  tint2
  lxterminal
  pcmanfm
  feh
  nitrogen
  compton
  rofi
  fonts-dejavu
  fonts-wqy-microhei
  fonts-noto
  fonts-noto-cjk
"

# 清理包
CLEAN_PACKAGES="
  deborphan
  localepurge
  bleachbit
"

# ==================== AI引擎配置 ====================
# Ollama配置
OLLAMA_MODEL="qwen2.5:1.5b-instruct-q4_K_M"
OLLAMA_PORT="11434"
OLLAMA_HOST="127.0.0.1"
OLLAMA_NUM_PARALLEL="1"
OLLAMA_NUM_GPU="0"  # 0=CPU, 1=使用GPU
OLLAMA_MAX_LOADED_MODELS="1"

# 模型下载配置
MODEL_MIRROR=""  # 国内镜像: https://ollama-mirror.region.example.com
MODEL_CACHE_SIZE="10G"  # 模型缓存大小
MODEL_AUTO_UPDATE="no"

# RAG配置
VECTOR_DB="chromadb"  # chromadb, faiss, qdrant
EMBEDDING_MODEL="BAAI/bge-small-zh-v1.5"
CHUNK_SIZE="500"
CHUNK_OVERLAP="50"
TOP_K_RESULTS="5"

# ==================== 安全配置 ====================
# 防火墙规则
UFW_RULES="
  allow 22/tcp    # SSH
  allow 80/tcp    # HTTP (for web interface)
  allow 443/tcp   # HTTPS
  allow 11434/tcp # Ollama API
  deny all
"

# SSH加固
SSH_PERMIT_ROOT_LOGIN="no"
SSH_PASSWORD_AUTHENTICATION="no"
SSH_PUBKEY_AUTHENTICATION="yes"
SSH_X11_FORWARDING="no"
SSH_MAX_AUTH_TRIES="3"
SSH_CLIENT_ALIVE_INTERVAL="300"

# 系统安全
DISABLE_ROOT_LOGIN="yes"
DISABLE_GUEST_ACCOUNT="yes"
ENABLE_APPARMOR="yes"
ENABLE_FAIL2BAN="yes"
AUTO_SECURITY_UPDATES="yes"

# ==================== 性能优化 ====================
# 内存优化
SWAP_SIZE="2G"           # 交换分区大小
SWAPPINESS="10"          # 交换倾向(0-100)
CACHE_PRESSURE="50"      # 缓存压力

# 磁盘优化
NOATIME_MOUNT="yes"      # 不记录访问时间
TRIM_SUPPORT="yes"       # SSD TRIM支持
WRITE_CACHE="writeback"  # 写缓存策略

# 网络优化
TCP_CONGESTION_CONTROL="bbr"
TCP_WINDOW_SCALING="yes"
TCP_TIMESTAMPS="yes"

# ==================== 应用配置 ====================
# BOSS-BOX应用
APP_NAME="bossbox"
APP_VERSION="0.1.0"
APP_PORT="3000"
APP_HOST="0.0.0.0"
APP_DATA_DIR="/opt/bossbox/data"
APP_LOG_DIR="/var/log/bossbox"
APP_CACHE_DIR="/var/cache/bossbox"

# 数据库配置
DB_ENGINE="sqlite"  # sqlite, postgresql, mysql
DB_NAME="bossbox.db"
DB_USER="bossbox"
DB_PASSWORD=""  # 自动生成
DB_HOST="localhost"
DB_PORT="5432"

# Web界面
WEB_TITLE="BOSS-BOX AI Assistant"
WEB_THEME="dark"  # dark, light, auto
WEB_LANGUAGE="zh-CN"  # zh-CN, en-US
WEB_ANALYTICS="no"    # 是否启用统计

# ==================== 构建配置 ====================
# 构建选项
BUILD_TYPE="release"  # debug, release, test
BUILD_JOBS="$(nproc)" # 并行编译任务数
BUILD_OPTIMIZE="yes"  # 优化构建
BUILD_DEBUG_SYMBOLS="no"  # 包含调试符号
BUILD_STRIP_BINARIES="yes"  # 剥离二进制

# 镜像输出
OUTPUT_FORMAT="iso"  # iso, img, raw, vmdk, qcow2
OUTPUT_COMPRESSION="xz"  # gz, xz, bz2, none
OUTPUT_CHECKSUM="yes"  # 生成校验和
OUTPUT_SIGN="no"       # 签名镜像

# 构建环境
BUILD_DIR="/tmp/bossbox-build"
CACHE_DIR="/var/cache/bossbox-build"
LOG_DIR="/var/log/bossbox-build"
KEEP_BUILD="no"  # 保留构建目录

# ==================== 测试配置 ====================
# 自动化测试
RUN_TESTS="yes"
TEST_TYPE="smoke"  # smoke, functional, integration, all
TEST_TIMEOUT="300"  # 测试超时(秒)
TEST_VERBOSE="no"

# 硬件测试
TEST_USB="yes"
TEST_BOOT="yes"
TEST_NETWORK="yes"
TEST_AI="yes"
TEST_ENCRYPTION="yes"

# ==================== 开发配置 ====================
# 调试选项
DEBUG_MODE="no"
LOG_LEVEL="info"  # debug, info, warn, error
REMOTE_DEBUG="no"
PROFILE_MODE="no"

# 开发工具
INCLUDE_DEV_TOOLS="no"
DEV_PACKAGES="
  gdb
  strace
  ltrace
  valgrind
  perf
  bpftrace
  tcpdump
  ngrep
  jq
  yq
  tmux
"

# ==================== 自定义钩子 ====================
# 构建前脚本
PRE_BUILD_SCRIPT="configs/hooks/pre-build.sh"

# 构建后脚本
POST_BUILD_SCRIPT="configs/hooks/post-build.sh"

# 首次启动脚本
FIRST_BOOT_SCRIPT="configs/hooks/first-boot.sh"

# 每日任务脚本
DAILY_SCRIPT="configs/hooks/daily.sh"

# 每周任务脚本
WEEKLY_SCRIPT="configs/hooks/weekly.sh"

# ==================== 版本信息 ====================
# 自动生成，请勿修改
BUILD_DATE="$(date +%Y%m%d)"
BUILD_TIME="$(date +%H%M%S)"
BUILD_ID="${BUILD_DATE}-${BUILD_TIME}"
GIT_COMMIT="$(git rev-parse --short HEAD 2>/dev/null || echo 'unknown')"
GIT_BRANCH="$(git branch --show-current 2>/dev/null || echo 'unknown')"